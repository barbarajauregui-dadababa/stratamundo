<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Strata Mundo favicon: brass gear on dark mahogany ground -->
  <rect width="64" height="64" fill="oklch(0.13 0.014 50)" />
  <!-- Outer brass ring with gear teeth -->
  <g fill="none" stroke="oklch(0.74 0.14 80)" stroke-width="3" stroke-linejoin="round">
    <!-- Gear teeth: 8 small rectangles around perimeter -->
    <rect x="29" y="2" width="6" height="9" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="29" y="53" width="6" height="9" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="2" y="29" width="9" height="6" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="53" y="29" width="9" height="6" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="9" y="9" width="8" height="8" transform="rotate(45 13 13)" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="47" y="9" width="8" height="8" transform="rotate(45 51 13)" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="9" y="47" width="8" height="8" transform="rotate(45 13 51)" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
    <rect x="47" y="47" width="8" height="8" transform="rotate(45 51 51)" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="1" />
  </g>
  <!-- Outer body of gear -->
  <circle cx="32" cy="32" r="22" fill="oklch(0.74 0.14 80)" stroke="oklch(0.42 0.10 65)" stroke-width="2" />
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="oklch(0.42 0.10 65)" stroke-width="1.2" opacity="0.7" />
  <!-- Crossed spokes -->
  <line x1="32" y1="16" x2="32" y2="48" stroke="oklch(0.42 0.10 65)" stroke-width="1.5" />
  <line x1="16" y1="32" x2="48" y2="32" stroke="oklch(0.42 0.10 65)" stroke-width="1.5" />
  <!-- Axle hub -->
  <circle cx="32" cy="32" r="5" fill="oklch(0.42 0.10 65)" />
  <circle cx="32" cy="32" r="2" fill="oklch(0.92 0.020 75)" />
</svg>
